<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>route-shot dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg: #0f1419; --panel: #161b22; --ink: #e6edf3; --mute: #8b949e;
    --accent: #58a6ff; --good: #3fb950; --warn: #d29922; --bad: #f85149;
    --code-bg: #0d1117; --border: #30363d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif; }
  header { padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; gap: 12px; align-items: center; }
  header h1 { font-size: 18px; margin: 0; }
  header .status { margin-left: auto; font-size: 13px; color: var(--mute); }
  .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--mute); margin-right: 6px; vertical-align: middle; }
  .status.running .dot { background: var(--warn); animation: pulse 1s infinite; }
  .status.idle .dot { background: var(--good); }
  @keyframes pulse { 50% { opacity: 0.3; } }
  main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px 24px; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; }
  .panel h2 { margin: 0 0 10px; font-size: 14px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.5px; }
  .row { display: flex; gap: 8px; align-items: center; margin: 8px 0; flex-wrap: wrap; }
  button, .btn { background: var(--bg); color: var(--ink); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #000; border-color: var(--accent); }
  button.danger { color: var(--bad); border-color: #4a1f1f; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  input[type=text], textarea {
    background: var(--code-bg); border: 1px solid var(--border); color: var(--ink);
    padding: 6px 10px; border-radius: 4px; font: 13px/1.4 "Cascadia Mono", Consolas, monospace;
    width: 100%;
  }
  textarea { resize: vertical; min-height: 280px; white-space: pre; tab-size: 2; }
  .logs { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px; font: 12px/1.4 "Cascadia Mono", Consolas, monospace;
    height: 300px; overflow-y: auto; white-space: pre-wrap; color: var(--ink); }
  .logs .err { color: var(--bad); }
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px; margin-top: 10px; max-height: 70vh; overflow-y: auto; padding-right: 4px; }
  .gallery .card { position: relative; background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden; cursor: zoom-in; }
  .gallery .card img { width: 100%; height: 120px; object-fit: cover; display: block; }
  .gallery .card .name { padding: 4px 6px; font-size: 11px; color: var(--mute);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gallery .card .del { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6);
    color: var(--bad); border: 1px solid var(--border); border-radius: 3px;
    width: 24px; height: 24px; line-height: 20px; text-align: center; font-size: 16px;
    cursor: pointer; opacity: 0; transition: opacity .12s; }
  .gallery .card:hover .del { opacity: 1; }
  .gallery .card .del:hover { background: var(--bad); color: #fff; }

  /* lightbox modal for full-screen view with scrolling */
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100;
    display: none; flex-direction: column; }
  .lightbox.show { display: flex; }
  .lightbox .lb-toolbar { display: flex; gap: 12px; align-items: center;
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); }
  .lightbox .lb-toolbar .name { flex: 1; color: var(--mute); font-family: monospace;
    font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lightbox .lb-body { flex: 1; overflow: auto; text-align: center; padding: 16px; }
  .lightbox img { max-width: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  .lightbox.fit img { max-width: 100%; height: auto; }
  .muted { color: var(--mute); font-size: 12px; }
  a { color: var(--accent); }
  footer { padding: 12px 24px; color: var(--mute); font-size: 12px; border-top: 1px solid var(--border); }
  .save-hint { color: var(--mute); font-size: 12px; }
  .save-hint.dirty { color: var(--warn); }
  .save-hint.saved { color: var(--good); }

  /* scan results table */
  .scan-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
  .scan-table th { text-align: left; padding: 6px 8px; color: var(--mute);
    font-weight: 500; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; }
  .scan-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .scan-table tr.hidden-el { opacity: 0.4; }
  .scan-table td code { font-size: 12px; }
  .scan-table td.sel { max-width: 300px; overflow-x: auto; white-space: nowrap; }
  .copyable { cursor: copy; position: relative; }
  .copyable:hover { background: rgba(88, 166, 255, 0.08); border-radius: 3px; }
  .copyable.flash { background: rgba(63, 185, 80, 0.25) !important; transition: background 0.4s; }
  .pill { display: inline-block; padding: 1px 6px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 10px; font-size: 11px; margin-right: 4px; }

  /* index.json summary strip */
  .idx-row { display: flex; gap: 8px; align-items: center; padding: 8px 10px;
    background: var(--code-bg); border: 1px solid var(--border); border-radius: 5px;
    margin-bottom: 6px; font-size: 13px; }
  .idx-row .idx-path { flex: 1; font-family: monospace; color: var(--mute);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .idx-row .stat { font-family: monospace; font-size: 12px; }
  .idx-row .ok { color: var(--good); }
  .idx-row .sk { color: var(--warn); }
  .idx-row .er { color: var(--bad); }

  /* JSON modal */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
    display: none; align-items: center; justify-content: center; padding: 40px; }
  .modal.show { display: flex; }
  .modal .box { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    max-width: 1100px; width: 100%; max-height: 90vh; display: flex; flex-direction: column; }
  .modal .box header { padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; gap: 12px; align-items: center; }
  .modal .box header .title { flex: 1; font-family: monospace; font-size: 13px; color: var(--mute); }
  .modal .box .body { flex: 1; overflow: auto; padding: 12px 16px; }
  .modal pre { background: var(--code-bg); padding: 14px; border-radius: 5px;
    border: 1px solid var(--border); margin: 0; font-size: 12px; white-space: pre-wrap;
    word-break: break-word; color: var(--ink); }
</style>
</head>
<body>

<header>
  <h1>route-shot</h1>
  <a href="/userguide.html" target="_blank" class="muted">user guide →</a>
  <div class="status idle" id="status"><span class="dot"></span><span id="statusText">idle</span></div>
</header>

<main>
  <section class="panel">
    <h2>Run</h2>
    <div class="row">
      <input type="text" id="singleUrl" placeholder="https://example.com" list="runsList">
      <datalist id="runsList"></datalist>
      <button id="runSingle">Crawl single URL</button>
    </div>
    <details style="margin-top: -4px;">
      <summary class="muted" style="cursor: pointer; font-size: 12px;">Recent runs</summary>
      <div id="runsHistory" class="row" style="flex-wrap: wrap; gap: 4px; margin-top: 6px;"></div>
    </details>
    <div class="row">
      <button id="runBatch" class="primary">Run batch (apps.json)</button>
      <button id="stopBtn" disabled>Stop</button>
      <button id="cleanBtn" class="danger">Clean screenshots</button>
    </div>
    <div class="logs" id="logs"></div>
  </section>

  <section class="panel">
    <h2>apps.json</h2>
    <div class="row" style="margin-bottom: 6px;">
      <select id="presetSelect" style="flex: 1;"></select>
      <button id="presetLoad">Load preset</button>
      <button id="presetSave">Save current as preset…</button>
      <button id="presetDel" class="danger" title="Delete selected preset">✕</button>
    </div>
    <textarea id="appsEditor" spellcheck="false"></textarea>
    <div class="row">
      <button id="saveApps" class="primary">Save</button>
      <button id="reloadApps">Reload</button>
      <button id="formatApps">Format</button>
      <span class="save-hint" id="saveHint">loaded</span>
    </div>
    <details style="margin-top: 10px;">
      <summary class="muted">Import DevTools Recorder JSON</summary>
      <div class="row" style="margin-top: 10px;">
        <input type="text" id="impName" placeholder="App name (optional)" style="flex: 1;">
        <label class="muted"><input type="checkbox" id="impAsClicks" checked> as-clicks mode</label>
      </div>
      <textarea id="impRec" placeholder="Paste the Recorder JSON export here…" style="min-height: 140px; margin-top: 6px;"></textarea>
      <div class="row">
        <button id="impBtn">Import + merge into apps.json</button>
      </div>
    </details>
  </section>

  <section class="panel" style="grid-column: 1 / -1;">
    <h2>Scan URL → pick buttons</h2>
    <div class="row">
      <input type="text" id="scanUrl" placeholder="https://example.com (leave blank to use first app in apps.json)" list="scansList">
      <datalist id="scansList"></datalist>
      <input type="text" id="scanDismiss" placeholder="dismiss selector (optional)" style="flex: 1;">
      <button id="scanBtn">Scan</button>
    </div>
    <details style="margin-top: -4px;">
      <summary class="muted" style="cursor: pointer; font-size: 12px;">Recent scans</summary>
      <div id="scansHistory" class="row" style="flex-wrap: wrap; gap: 4px; margin-top: 6px;"></div>
    </details>
    <div class="row muted" id="scanStatus"></div>
    <div id="scanResults" style="max-height: 400px; overflow-y: auto;"></div>
    <div class="row" id="scanActions" style="display: none;">
      <button id="scanAllBtn">Select all</button>
      <button id="scanNoneBtn">Select none</button>
      <button id="scanVisibleBtn">Only visible</button>
      <select id="scanTargetApp"></select>
      <button id="scanAddBtn" class="primary">Add checked selectors to clicks[]</button>
    </div>
  </section>

  <section class="panel" style="grid-column: 1 / -1;">
    <h2>Screenshots <span class="muted" id="shotCount"></span></h2>
    <div id="indexes"></div>
    <div class="gallery" id="gallery"></div>
  </section>
</main>

<!-- JSON modal -->
<div class="modal" id="jsonModal">
  <div class="box">
    <header>
      <span class="title" id="jsonTitle"></span>
      <button id="jsonCopy">Copy</button>
      <button id="jsonRaw">Open raw</button>
      <button id="jsonClose">Close ✕</button>
    </header>
    <div class="body"><pre id="jsonBody"></pre></div>
  </div>
</div>

<!-- full-screen scrollable image viewer -->
<div class="lightbox" id="lightbox">
  <div class="lb-toolbar">
    <button id="lbPrev">←</button>
    <button id="lbNext">→</button>
    <button id="lbFit">Fit / Actual size</button>
    <span class="name" id="lbName"></span>
    <button id="lbOpen">Open tab</button>
    <button id="lbDel" class="danger">Delete</button>
    <button id="lbClose">Close ✕</button>
  </div>
  <div class="lb-body" id="lbBody"><img id="lbImg"></div>
</div>

<footer>
  route-shot dashboard · <a href="https://github.com/abourdim/route-shot" target="_blank">github</a>
</footer>

<script>
const $ = (id) => document.getElementById(id);
let lastLogTs = 0;
let polling = false;

async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  return r.json();
}

function appendLog(entries) {
  if (!entries || !entries.length) return;
  const box = $('logs');
  for (const e of entries) {
    const div = document.createElement('div');
    if (/\[stderr\]|Error|✗|failed/i.test(e.line)) div.className = 'err';
    div.textContent = e.line;
    box.appendChild(div);
    lastLogTs = Math.max(lastLogTs, e.ts);
  }
  box.scrollTop = box.scrollHeight;
}

function setStatus(running, exit) {
  const el = $('status');
  el.className = 'status ' + (running ? 'running' : 'idle');
  $('statusText').textContent = running
    ? 'running' + (run.command ? ` — ${run.command}` : '')
    : (exit !== null && exit !== undefined ? `idle (last exit: ${exit})` : 'idle');
  $('stopBtn').disabled = !running;
  $('runSingle').disabled = running;
  $('runBatch').disabled = running;
  $('cleanBtn').disabled = running;
}

const run = { command: null };

async function pollLogs() {
  if (polling) return;
  polling = true;
  try {
    const r = await fetchJSON('/api/logs?since=' + lastLogTs);
    appendLog(r.entries);
    if (r.running) setStatus(true, null);
    else setStatus(false, r.exit);
    if (!r.running) {
      // one final refresh of the gallery
      loadGallery();
    }
  } catch (e) {}
  polling = false;
}

setInterval(pollLogs, 800);

async function loadApps() {
  const r = await fetchJSON('/api/apps');
  $('appsEditor').value = JSON.stringify(r, null, 2);
  markSaved('loaded');
}

function markDirty() {
  const h = $('saveHint');
  h.textContent = 'unsaved';
  h.className = 'save-hint dirty';
}
function markSaved(msg) {
  const h = $('saveHint');
  h.textContent = msg || 'saved';
  h.className = 'save-hint saved';
}

$('appsEditor').addEventListener('input', markDirty);

$('reloadApps').onclick = loadApps;
$('formatApps').onclick = () => {
  try {
    const v = JSON.parse($('appsEditor').value);
    $('appsEditor').value = JSON.stringify(v, null, 2);
    markDirty();
  } catch (e) {
    alert('Invalid JSON: ' + e.message);
  }
};
$('saveApps').onclick = async () => {
  let body;
  try { body = JSON.parse($('appsEditor').value); }
  catch (e) { alert('Invalid JSON: ' + e.message); return; }
  const r = await fetchJSON('/api/apps', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (r.error) { alert(r.error); return; }
  markSaved('saved ✓');
};

$('runSingle').onclick = async () => {
  const url = $('singleUrl').value.trim();
  if (!url) return;
  $('logs').innerHTML = '';
  lastLogTs = 0;
  run.command = 'single';
  const r = await fetchJSON('/api/run/single', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url }),
  });
  if (r.error) alert(r.error);
};

$('runBatch').onclick = async () => {
  $('logs').innerHTML = '';
  lastLogTs = 0;
  run.command = 'batch';
  const r = await fetchJSON('/api/run/batch', { method: 'POST' });
  if (r.error) alert(r.error);
};

$('stopBtn').onclick = async () => {
  await fetchJSON('/api/stop', { method: 'POST' });
};

$('cleanBtn').onclick = async () => {
  if (!confirm('Delete all screenshots?')) return;
  await fetchJSON('/api/clean', { method: 'POST' });
  loadGallery();
};

$('impBtn').onclick = async () => {
  const rec = $('impRec').value.trim();
  if (!rec) return;
  try { JSON.parse(rec); } catch (e) { alert('Not valid JSON — did you paste the Puppeteer/Playwright script by mistake?'); return; }
  const r = await fetchJSON('/api/import-recording', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      recording: rec,
      name: $('impName').value.trim() || undefined,
      asClicks: $('impAsClicks').checked,
    }),
  });
  if (r.error) { alert(r.error); return; }
  appendLog([{ ts: Date.now(), line: r.stdout }]);
  await loadApps();
};

let galleryFiles = [];
let lbIndex = -1;

async function loadIndexes() {
  let r;
  try { r = await fetchJSON('/api/indexes'); } catch { return; }
  const box = $('indexes');
  box.innerHTML = '';
  (r.indexes || []).forEach((ix) => {
    const row = document.createElement('div');
    row.className = 'idx-row';
    const label = ix.app ? `${ix.app}` : '(top-level roll-up)';
    row.innerHTML = `
      <strong>${escapeHtml(label)}</strong>
      <span class="idx-path">${escapeHtml(ix.path)}</span>
      <span class="stat">pages: <b>${ix.pageCount}</b></span>
      <span class="stat ok">ok ${ix.ok}</span>
      <span class="stat sk">skipped ${ix.skipped}</span>
      <span class="stat er">err ${ix.errors}</span>
      <button data-path="${escapeHtml(ix.path)}" class="viewIndex">View JSON</button>
    `;
    box.appendChild(row);
  });
  box.querySelectorAll('.viewIndex').forEach((b) => {
    b.onclick = () => showJson(b.dataset.path);
  });
}

async function showJson(relPath) {
  try {
    const r = await fetch('/api/index?path=' + encodeURIComponent(relPath));
    const txt = await r.text();
    let pretty = txt;
    try { pretty = JSON.stringify(JSON.parse(txt), null, 2); } catch {}
    $('jsonTitle').textContent = relPath;
    $('jsonBody').textContent = pretty;
    $('jsonModal').classList.add('show');
    $('jsonRaw').onclick  = () => window.open('/screenshots/' + encodeURI(relPath), '_blank');
    $('jsonCopy').onclick = () => navigator.clipboard.writeText(pretty);
  } catch (e) { alert('Failed: ' + e.message); }
}
$('jsonClose').onclick = () => $('jsonModal').classList.remove('show');
$('jsonModal').addEventListener('click', (e) => { if (e.target.id === 'jsonModal') $('jsonClose').click(); });

async function loadGallery() {
  const r = await fetchJSON('/api/shots');
  galleryFiles = r.files;
  loadIndexes();
  const g = $('gallery');
  g.innerHTML = '';
  $('shotCount').textContent = r.files.length ? `(${r.files.length})` : '';
  r.files.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="/screenshots/${encodeURI(f)}" loading="lazy">
      <div class="name">${escapeHtml(f)}</div>
      <div class="del" title="Delete">×</div>`;
    card.querySelector('img').onclick    = (e) => { e.stopPropagation(); openLightbox(i); };
    card.querySelector('.name').onclick  = () => openLightbox(i);
    card.querySelector('.del').onclick   = async (e) => {
      e.stopPropagation();
      if (!confirm(`Delete ${f}?`)) return;
      await fetch('/api/shot?path=' + encodeURIComponent(f), { method: 'DELETE' });
      loadGallery();
    };
    g.appendChild(card);
  });
}

function openLightbox(i) {
  if (i < 0 || i >= galleryFiles.length) return;
  lbIndex = i;
  const f = galleryFiles[i];
  $('lbImg').src = '/screenshots/' + encodeURI(f);
  $('lbName').textContent = `${f}  (${i + 1}/${galleryFiles.length})`;
  $('lightbox').classList.add('show');
  $('lightbox').classList.add('fit');          // start fitted; toggle for actual-size
  $('lbBody').scrollTop = 0; $('lbBody').scrollLeft = 0;
}
function closeLightbox() { $('lightbox').classList.remove('show'); lbIndex = -1; }

$('lbClose').onclick = closeLightbox;
$('lbPrev').onclick  = () => openLightbox(Math.max(0, lbIndex - 1));
$('lbNext').onclick  = () => openLightbox(Math.min(galleryFiles.length - 1, lbIndex + 1));
$('lbFit').onclick   = () => $('lightbox').classList.toggle('fit');
$('lbOpen').onclick  = () => lbIndex >= 0 && window.open('/screenshots/' + encodeURI(galleryFiles[lbIndex]), '_blank');
$('lbDel').onclick   = async () => {
  if (lbIndex < 0) return;
  const f = galleryFiles[lbIndex];
  if (!confirm(`Delete ${f}?`)) return;
  await fetch('/api/shot?path=' + encodeURIComponent(f), { method: 'DELETE' });
  const wasLast = lbIndex >= galleryFiles.length - 1;
  await loadGallery();
  if (!galleryFiles.length) closeLightbox();
  else openLightbox(wasLast ? galleryFiles.length - 1 : lbIndex);
};

document.addEventListener('keydown', (e) => {
  if (!$('lightbox').classList.contains('show')) return;
  if (e.key === 'Escape')     closeLightbox();
  else if (e.key === 'ArrowLeft')  $('lbPrev').click();
  else if (e.key === 'ArrowRight') $('lbNext').click();
  else if (e.key === 'Delete')     $('lbDel').click();
  else if (e.key === 'f' || e.key === 'F') $('lbFit').click();
});

// --- scan ------------------------------------------------------------------
let scanItems = [];

async function populateTargetAppSelect() {
  try {
    const r = await fetchJSON('/api/apps');
    const sel = $('scanTargetApp');
    sel.innerHTML = '';
    (r.apps || []).forEach((a, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `→ ${a.name || '(unnamed)'} (${i})`;
      sel.appendChild(opt);
    });
  } catch (e) {}
}

$('scanBtn').onclick = async () => {
  let url = $('scanUrl').value.trim();
  let dismiss = $('scanDismiss').value.trim();
  if (!url) {
    // use first app's URL + dismiss from apps.json
    const r = await fetchJSON('/api/apps');
    const first = (r.apps || [])[0];
    if (!first) { alert('No URL given and apps.json is empty.'); return; }
    url = first.url;
    if (!dismiss) dismiss = first.dismiss || '';
    $('scanUrl').value = url;
    if (dismiss && !$('scanDismiss').value) $('scanDismiss').value = dismiss;
  }
  $('scanStatus').textContent = 'Scanning… (launching Chromium, this takes a few seconds)';
  $('scanResults').innerHTML = '';
  $('scanActions').style.display = 'none';
  try {
    const r = await fetchJSON('/api/scan', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, dismiss: dismiss || undefined }),
    });
    if (r.error) { $('scanStatus').textContent = 'Error: ' + r.error; return; }
    scanItems = r.items;
    renderScanTable();
    $('scanStatus').textContent = `Found ${r.count} clickable element(s) — ${r.items.filter(i=>i.visible).length} visible.`;
    $('scanActions').style.display = 'flex';
    await populateTargetAppSelect();
  } catch (e) {
    $('scanStatus').textContent = 'Scan failed: ' + e.message;
  }
};

function renderScanTable() {
  const rows = scanItems.map((it, i) => {
    const hasId = !!it.id;
    const rawLabel = it.text || it.id || '';
    const label = rawLabel || '(no text)';
    const idCell = it.id
      ? `<code class="copyable" data-copy="${escapeHtml(it.id)}" title="Click to copy">#${escapeHtml(it.id)}</code>`
      : '<span class="muted">—</span>';
    const labelCell = rawLabel
      ? `<span class="copyable" data-copy="${escapeHtml(rawLabel)}" title="Click to copy">${escapeHtml(label).slice(0, 60)}</span>`
      : '<span class="muted">(no text)</span>';
    return `<tr class="${it.visible ? '' : 'hidden-el'}" data-i="${i}">
      <td><input type="checkbox" class="scan-cb" ${it.visible && hasId ? 'checked' : ''}></td>
      <td><span class="pill">${it.tag}</span>${it.role ? `<span class="pill">${it.role}</span>` : ''}</td>
      <td>${labelCell}</td>
      <td>${idCell}</td>
      <td class="sel"><code class="copyable" data-copy="${escapeHtml(it.selector)}" title="Click to copy">${escapeHtml(it.selector)}</code></td>
    </tr>`;
  }).join('');
  $('scanResults').innerHTML = `
    <table class="scan-table">
      <thead><tr><th></th><th>Tag</th><th>Label <span class="muted" style="font-weight:normal;">(click to copy)</span></th><th>ID</th><th>Selector</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  // wire click-to-copy
  $('scanResults').querySelectorAll('.copyable').forEach((el) => {
    el.onclick = async (e) => {
      e.stopPropagation();
      const val = el.dataset.copy;
      try {
        await navigator.clipboard.writeText(val);
        el.classList.add('flash');
        $('scanStatus').textContent = `Copied: ${val}`;
        setTimeout(() => el.classList.remove('flash'), 400);
      } catch {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = val; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); ta.remove();
        $('scanStatus').textContent = `Copied: ${val}`;
      }
    };
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

$('scanAllBtn').onclick    = () => document.querySelectorAll('.scan-cb').forEach((cb) => cb.checked = true);
$('scanNoneBtn').onclick   = () => document.querySelectorAll('.scan-cb').forEach((cb) => cb.checked = false);
$('scanVisibleBtn').onclick = () => {
  document.querySelectorAll('#scanResults tr[data-i]').forEach((tr) => {
    const i = Number(tr.dataset.i);
    const cb = tr.querySelector('.scan-cb');
    cb.checked = scanItems[i].visible;
  });
};

$('scanAddBtn').onclick = async () => {
  const picked = [];
  document.querySelectorAll('#scanResults tr[data-i]').forEach((tr) => {
    const cb = tr.querySelector('.scan-cb');
    if (cb.checked) picked.push(scanItems[Number(tr.dataset.i)].selector);
  });
  if (!picked.length) { alert('Nothing checked.'); return; }
  const r = await fetchJSON('/api/apps');
  const idx = Number($('scanTargetApp').value || 0);
  const app = (r.apps || [])[idx];
  if (!app) { alert('App index out of range.'); return; }
  app.clicks = [...new Set([...(app.clicks || []), ...picked])];
  if (!app.clickMode) app.clickMode = 'independent';
  const save = await fetchJSON('/api/apps', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(r),
  });
  if (save.error) { alert(save.error); return; }
  $('scanStatus').textContent = `Added ${picked.length} selector(s) to "${app.name}" · clicks[].`;
  await loadApps();
};

// --- history ----------------------------------------------------------------
async function loadHistory() {
  let h;
  try { h = await fetchJSON('/api/history'); } catch { return; }
  renderHistory('runs',  h.runs || [],  $('runsList'),  $('runsHistory'),  $('singleUrl'));
  renderHistory('scans', h.scans || [], $('scansList'), $('scansHistory'), $('scanUrl'));
}

function renderHistory(kind, entries, datalistEl, chipsEl, targetInput) {
  datalistEl.innerHTML = entries.map((e) =>
    `<option value="${escapeHtml(e.url)}">`).join('');
  chipsEl.innerHTML = '';
  if (!entries.length) { chipsEl.innerHTML = '<span class="muted">(empty)</span>'; return; }
  entries.slice(0, 10).forEach((e) => {
    const chip = document.createElement('span');
    chip.className = 'pill';
    chip.style.cursor = 'pointer';
    chip.title = new Date(e.ts).toLocaleString();
    chip.innerHTML = `<span>${escapeHtml(e.url)}</span> <span style="opacity:0.5; margin-left:4px;" title="forget">✕</span>`;
    chip.querySelector('span:first-child').onclick = () => { targetInput.value = e.url; };
    chip.querySelector('span:last-child').onclick  = async (ev) => {
      ev.stopPropagation();
      await fetch('/api/history?kind=' + kind + '&url=' + encodeURIComponent(e.url), { method: 'DELETE' });
      loadHistory();
    };
    chipsEl.appendChild(chip);
  });
}

// refresh history after a run / scan completes
const origRunSingle = $('runSingle').onclick;
$('runSingle').onclick = async (...a) => { const r = await origRunSingle(...a); setTimeout(loadHistory, 300); return r; };
const origScanBtn = $('scanBtn').onclick;
$('scanBtn').onclick = async (...a) => { const r = await origScanBtn(...a); setTimeout(loadHistory, 300); return r; };

// --- presets ----------------------------------------------------------------
async function loadPresets() {
  try {
    const r = await fetchJSON('/api/presets');
    const sel = $('presetSelect');
    sel.innerHTML = (r.presets || []).map((p) => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
    if (!r.presets.length) sel.innerHTML = '<option value="">(no presets yet)</option>';
  } catch (e) {}
}

$('presetLoad').onclick = async () => {
  const name = $('presetSelect').value;
  if (!name) return;
  const r = await fetchJSON('/api/presets/' + encodeURIComponent(name));
  if (r.error) { alert(r.error); return; }
  $('appsEditor').value = JSON.stringify(r, null, 2);
  markDirty();
  $('saveHint').textContent = `loaded preset "${name}" (remember to Save)`;
};

$('presetSave').onclick = async () => {
  let body;
  try { body = JSON.parse($('appsEditor').value); }
  catch (e) { alert('Current editor content is not valid JSON: ' + e.message); return; }
  const name = prompt('Preset name (letters, digits, _ . - only):', 'my-preset');
  if (!name) return;
  if (!/^[\w.-]+$/.test(name)) { alert('Bad name'); return; }
  const r = await fetchJSON('/api/presets/' + encodeURIComponent(name), {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (r.error) { alert(r.error); return; }
  await loadPresets();
  $('presetSelect').value = name;
  $('saveHint').textContent = `saved preset "${name}"`;
};

$('presetDel').onclick = async () => {
  const name = $('presetSelect').value;
  if (!name) return;
  if (!confirm(`Delete preset "${name}"?`)) return;
  await fetch('/api/presets/' + encodeURIComponent(name), { method: 'DELETE' });
  await loadPresets();
};

loadApps();
loadGallery();
loadHistory();
loadPresets();
</script>

</body>
